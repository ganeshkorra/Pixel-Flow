        html, body { height: 100%; margin: 0; font-family: Arial, sans-serif; }
        #canvas-container { width: 100%; height: 100vh; display: block; position: relative; }
        #controls { position: absolute; left: 50%; transform: translateX(-50%); bottom: 20px; display: flex; gap: 10px; }
        .color-btn { width: 40px; height: 40px; border-radius: 6px; border: 2px solid rgba(0,0,0,0.2); cursor: pointer; }
        .color-btn:focus { outline: 2px solid #fff; }
        #hint { position: absolute; left: 10px; top: 10px; background: rgba(0,0,0,0.4); color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 13px; }
        
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            #hint { font-size: 11px; padding: 5px 8px; left: 8px; top: 8px; }
            .color-btn { width: 35px; height: 35px; }
            #controls { bottom: 15px; gap: 8px; }
        }
        
        @media (max-width: 480px) {
            #hint { font-size: 10px; padding: 4px 6px; left: 5px; top: 5px; }
            .color-btn { width: 30px; height: 30px; }
            #controls { bottom: 12px; gap: 6px; }
        }
        
        /* Landscape orientation adjustments */
        @media (max-height: 500px) and (orientation: landscape) {
            #hint { font-size: 10px; padding: 4px 6px; }
            .color-btn { width: 28px; height: 28px; }
            #controls { bottom: 10px; gap: 5px; }
        }
        
        /* Touch device optimizations */
        @media (hover: none) and (pointer: coarse) {
            .color-btn { width: 45px; height: 45px; }
            #hint { padding: 8px 12px; }
        }
        
        /* Prevent text selection on long touches */
        * { user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        canvas { display: block; }

        // ========================================================

        async function parseImageToLevel(imgUrl, width, height) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.src = imgUrl;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = width;
                    canvas.height = height;
                    
                    // Draw image scaled down to the machine size
                    ctx.drawImage(img, 0, 0, width, height);
                    const data = ctx.getImageData(0, 0, width, height).data;
                    const newPattern = [];

                    const palette = window.game_object.GameThemes.CubeColors.data;

                    for (let y = 0; y < height; y++) {
                        const row = [];
                        for (let x = 0; x < width; x++) {
                            const i = (y * width + x) * 4;
                            const r = data[i], g = data[i+1], b = data[i+2];
                            
                            // Logic: Find which of our 5 colors is closest to this pixel
                            let closestID = 0;
                            let minDist = Infinity;
                            
                            Object.keys(palette).forEach(id => {
                                const col = new THREE.Color(palette[id].code);
                                const dr = r - col.r * 255;
                                const dg = g - col.g * 255;
                                const db = b - col.b * 255;
                                const dist = dr*dr + dg*dg + db*db; // Math: distance check
                                if(dist < minDist) { minDist = dist; closestID = parseInt(id); }
                            });
                            row.push(closestID);
                        }
                        newPattern.push(row);
                    }
                    resolve(newPattern);
                };
            });
        }

function createCharLabelTexture(text) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');

    // Matching the game reference style: Bold white with thick black outline
    const fontSize = 150;
    ctx.font = `bold ${fontSize}px Arial Black, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // 1. Draw Thick Black Outline
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 28; 
    ctx.lineJoin = 'round';
    ctx.strokeText(text, 128, 128);

    // 2. Draw White Text Fill
    ctx.fillStyle = '#ffffff';
    ctx.fillText(text, 128, 128);

    return new THREE.CanvasTexture(canvas);
}

function createCharLabel(Char) {
    const text = Char.userData.value.toString();
    const texture = createCharLabelTexture(text);
    const spriteMaterial = new THREE.SpriteMaterial({ 
        map: texture, 
        transparent: true,
        depthTest: false
    });
    const sprite = new THREE.Sprite(spriteMaterial);
    sprite.scale.set(4, 4, 1);
    return sprite;
}

function updateCharLabel(Char) {
    const text = Char.userData.value.toString();
    const texture = createCharLabelTexture(text);
    const label = Char.children.find(child => child.isSprite);
    if (label) {
        label.material.map.dispose();
        label.material.map = texture;
        label.material.needsUpdate = true;
    }
}

        // Char Loader
        loader.load(window.game_object.GameElements.CharModel.data, function(gltf) {
            baseCharModel = gltf.scene; // Save reference for cloning new Chars later
            const base = gltf.scene;

            // Compute scale based on original model size, so every clone uses same scale
            const baseBox = new THREE.Box3().setFromObject(base);
            const baseSize = baseBox.getSize(new THREE.Vector3());
            const maxDim = Math.max(baseSize.x, baseSize.y, baseSize.z);
            const scale = 1.2 / maxDim;
            globalCharScale = scale; // Save this value for spawning

            const grid = GRID;
            const spacing = Math.max(maxDim * scale * 1.6, 1.2);

            const tileHeight = 0.08;
            // z position: between thread mill and Char grid with more separation
            const zTiles = 3;

            // Function to create a styled tile with base and border
            function createStyledTile(x, z) {
                const tileGroup = new THREE.Group();
                
                // Base tile - main platform
                const baseGeom = new THREE.BoxGeometry(tileSize, tileHeight, tileSize);
                const baseMat = new THREE.MeshStandardMaterial({ 
                    color: 0x1f2937,
                    metalness: 0.3,
                    roughness: 0.6
                });
                const baseMesh = new THREE.Mesh(baseGeom, baseMat);
                baseMesh.position.y = tileHeight / 2;
                baseMesh.castShadow = false;
                baseMesh.receiveShadow = true;
                tileGroup.add(baseMesh);
                
                // Border rim - top edge highlight
                const rimGeom = new THREE.TorusGeometry(tileSize * 0.48, tileSize * 0.05, 8, 32);
                const rimMat = new THREE.MeshStandardMaterial({ 
                    color: 0x6366f1,
                    metalness: 0.6,
                    roughness: 0.3,
                    emissive: 0x4f46e5,
                    emissiveIntensity: 0.5
                });
                const rimMesh = new THREE.Mesh(rimGeom, rimMat);
                rimMesh.position.y = tileHeight + 0.05;
                rimMesh.rotation.x = Math.PI / 2;
                rimMesh.receiveShadow = false;
                rimMesh.castShadow = false;
                tileGroup.add(rimMesh);
                
                // Light indicator sphere (glowing center)
                const indicatorGeom = new THREE.SphereGeometry(tileSize * 0.15, 16, 16);
                const indicatorMat = new THREE.MeshStandardMaterial({ 
                    color: 0x3b82f6,
                    emissive: 0x60a5fa,
                    emissiveIntensity: 0.8,
                    metalness: 0.4
                });
                const indicatorMesh = new THREE.Mesh(indicatorGeom, indicatorMat);
                indicatorMesh.position.y = tileHeight + 0.1;
                indicatorMesh.receiveShadow = false;
                indicatorMesh.castShadow = false;
                tileGroup.add(indicatorMesh);
                
                tileGroup.position.set(x, 0, z);
                tileGroup.userData = { 
                    baseColor: 0x1f2937,
                    rimMesh: rimMesh,
                    indicatorMesh: indicatorMesh,
                    baseMesh: baseMesh
                };
                
                return tileGroup;
            }
            
            for (let i = 0; i < tileCount; i++) {
                const xPos = (i - Math.floor(tileCount/2)) * spacing;
                const tile = createStyledTile(xPos, zTiles);
                scene.add(tile);
                tiles.push(tile);
            }

        // Function to update tile appearance when character lands
        function updateTileAppearance(tileIndex, characterColor) {
            if (tileIndex >= 0 && tileIndex < tiles.length) {
                const tile = tiles[tileIndex];
                const rimMesh = tile.userData.rimMesh;
                const indicatorMesh = tile.userData.indicatorMesh;
                
                // Update rim color to match character
                rimMesh.material.color.setStyle(characterColor);
                rimMesh.material.emissive.setStyle(characterColor);
                
                // Update indicator glow
                indicatorMesh.material.color.setStyle(characterColor);
                indicatorMesh.material.emissive.setStyle(characterColor);
                
                // Pulse animation on landing
                addAnim({
                    elapsed: 0, duration: 300,
                    update(dt) {
                        this.elapsed += dt;
                        const t = this.elapsed / this.duration;
                        const pulseFactor = 1 + Math.sin(t * Math.PI * 2) * 0.3;
                        indicatorMesh.scale.setScalar(pulseFactor);
                        if (t >= 1) {
                            indicatorMesh.scale.setScalar(1);
                            return true;
                        }
                        return false;
                    }
                });
            }
        }

        const squareMaterialConfig = {

        // Load Square.glb Inside Slot
        let squareModel = null;
        loader.load("Square.glb", function(gltf) {
            squareModel = gltf.scene;
            console.log('Square.glb loaded:', squareModel);
            
            // Calculate appropriate scale based on model size
            const squareBox = new THREE.Box3().setFromObject(squareModel);
            const squareSize = squareBox.getSize(new THREE.Vector3());
            const squareMaxDim = Math.max(squareSize.x, squareSize.y, squareSize.z);
            const squareScale = 1 / squareMaxDim; // Scale slightly smaller than slot
            
            squareModel.scale.setScalar(squareScale);
            
            console.log('Square dimensions:', squareSize, 'Max:', squareMaxDim, 'Applied scale:', squareScale);
            
            // Spawn 3 square clones in the slot with different positions
            const squarePositions = [
                { x: -3.0, y: 0.05, z: 0.8 },   // Center back
                { x: -2.8, y: 0.05, z: 0.8 },   // Front left
                { x: -2.6, y: 0.05, z: 0.8 }    // Front right
            ];
            
            // Create blue material for squares
            const blueMaterial = new THREE.MeshStandardMaterial({
                color: 0x3c4557,
                metalness: 0.0,
                roughness: 0.2,
                emissive: 0x3c4557,
                emissiveIntensity: 2.0,
                toneMapped: false
            });
            
            squarePositions.forEach((pos, idx) => {
                const squareClone = squareModel.clone(true);
                squareClone.position.set(pos.x, pos.y, pos.z);
                squareClone.userData = { originalPos: new THREE.Vector3(pos.x, pos.y, pos.z) }; // Store original position
                
                // Check if model has meshes
                let hasMesh = false;
                squareClone.traverse((node) => {
                    if (node.isMesh) {
                        hasMesh = true;
                        if (node.material) node.material.dispose();
                        node.material = blueMaterial.clone();
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
                
                // If no meshes found, create a visible blue box
                if (!hasMesh) {
                    const boxGeometry = new THREE.BoxGeometry(0.3, 0.1, 0.3);

                        obj.position.lerpVectors(from, to, t);
                        if (t >= 1) { return true; }
                        return false;
                    },
                    finish: resolve
                };
                addAnim(anim);   
            });
        }

        function runCircle(obj, center, duration, rotations = 2, radius = 0.25) {
            return new Promise(resolve => {
                const anim = {
                    elapsed: 0,
                    duration,
                    update(dt) {
                        this.elapsed += dt;
                        const t = Math.min(this.elapsed / this.duration, 1);
                        const angle = t * rotations * Math.PI * 2;
                        obj.position.x = center.x + Math.cos(angle) * radius;
                        obj.position.z = center.z + Math.sin(angle) * radius;
                        obj.rotation.y += dt * 6.0; // spin while running
                        if (t >= 1) { return true; }
                        return false;
                    },
                    finish: resolve
                };
                addAnim(anim);
            });
        }

// CUBE POP AND BLAST ANIMATION: Squeeze -> Expansion -> Shatter
function playCubePopAnimation(cube, cubeColor) {
    const cubeSize = window.game_object.GameProperties.CubeSize;
    const originalScaleX = cubeSize.width;
    const originalScaleY = cubeSize.height;
    const originalScaleZ = cubeSize.depth;
    const popDuration = 240;

    addAnim({
        elapsed: 0, duration: popDuration,
        update(dt) {
            this.elapsed += dt;
            const t = this.elapsed / this.duration;

            if (t < 0.4) {
                // STAGE 1: THE SQUEEZE (Compressive reaction to bullet impact)
                // 0% -> 40% time: Cube gets thinner on X/Z, stretches tall on Y
                const squeeze = Math.sin((t / 0.4) * Math.PI);
                cube.scale.set(
                    originalScaleX * (1 - squeeze * 0.4), // Compress width
                    originalScaleY * (1 + squeeze * 0.6), // Stretch height (The Pop-up)
                    originalScaleZ * (1 - squeeze * 0.4)  // Compress depth
                );
            } else {
                // STAGE 2: THE BLAST (Rapid expansion before shatter)
                // 40% -> 100% time: Expands outward rapidly, fades to transparent
                const blast = (t - 0.4) / 0.6;
                const expand = 1 + Math.sin(blast * Math.PI) * 0.8; // Puffs out
                cube.scale.set(
                    originalScaleX * expand,
                    originalScaleY * expand,
                    originalScaleZ * expand
                );
                
                // Fade all materials to invisible
                cube.traverse(n => {
                    if (n.material) {
                        n.material.transparent = true;
                        n.material.opacity = 1 - blast;
                    }
                });
            }

            if (t >= 1) {
                createImpactEffect(cube.position.clone(), cubeColor); // Spawn final shards
                scene.remove(cube);
                return true;
            }
            return false;
        }
    });
}

// SQUARE POP, FLIP AND MOVE ANIMATION: When character is clicked, activate entry square
function activateSquareAtEntry(character) {
    if (squareClones.length === 0) return;
    
    const square = squareClones[nextSquareIndex % squareClones.length];
    nextSquareIndex++;
    
    // Store reference to active square on character so it can be removed later
    if (character) {
        character.userData.activeSquare = square;
    }
    
    const mX = 0, mZ = -3.5, h = 1;
    
    const p1 = new THREE.Vector3(mX-2, h, mZ+4);      // Entry
    const p2 = new THREE.Vector3(mX+2.8, h, mZ+4);    // Corner FR
    const p3 = new THREE.Vector3(mX+3.4, h, mZ-2.8);  // Corner BR
    const p4 = new THREE.Vector3(mX-3.4, h, mZ-2.8);  // Corner BL
    const p5 = new THREE.Vector3(mX-4.4, h, mZ+2.8);  // Exit
    
    const startPos = square.position.clone();
    const startQuat = square.quaternion.clone();
    
    // Calculate final flat rotation (backward flip around Z-axis: -90 degrees)
    const backwardFlip = new THREE.Quaternion();
    backwardFlip.setFromAxisAngle(new THREE.Vector3(0, 0, 1), -Math.PI / 2);
    const flatQuat = new THREE.Quaternion().multiplyQuaternions(backwardFlip, startQuat);
    
    // PHASE 1: Flip backward 90° + Move to entry (600ms)
    addAnim({
        elapsed: 0, duration: 600,
        update(dt) {
            this.elapsed += dt;
            const t = Math.min(this.elapsed / this.duration, 1);
            
            // Move from slot to entry
            square.position.lerpVectors(startPos, p1, t);
            
            // Smoothly rotate backward to flat
            const flipAmount = -t * Math.PI / 2;
            const flipQuat = new THREE.Quaternion();
            flipQuat.setFromAxisAngle(new THREE.Vector3(0, 0, 1), flipAmount);
            square.quaternion.multiplyQuaternions(flipQuat, startQuat);
            
            if (t >= 1) {
                square.quaternion.copy(flatQuat);
                return true;
            }
            return false;
        }
    });
    
    // PHASE 2: P1 -> P2 (600ms) - Stay flat under character
    setTimeout(() => {
        addAnim({
            elapsed: 0, duration: 600,
            update(dt) {
                this.elapsed += dt;
                const t = Math.min(this.elapsed / this.duration, 1);
                square.position.lerpVectors(p1, p2, t);
                square.quaternion.copy(flatQuat);
                if (t >= 1) return true;
                return false;
            }
        });
    }, 600);
    
    // PHASE 3: P2 -> P3 (600ms)
    setTimeout(() => {
        addAnim({
            elapsed: 0, duration: 900,
            update(dt) {
                this.elapsed += dt;
                const t = Math.min(this.elapsed / this.duration, 1);
                square.position.lerpVectors(p2, p3, t);
                square.quaternion.copy(flatQuat);
                if (t >= 1) return true;
                return false;
            }
        });
    }, 1200);
    
    // PHASE 4: P3 -> P4 (800ms)
    setTimeout(() => {
        addAnim({
            elapsed: 0, duration: 800,
            update(dt) {
                this.elapsed += dt;
                const t = Math.min(this.elapsed / this.duration, 1);
                square.position.lerpVectors(p3, p4, t);
                square.quaternion.copy(flatQuat);
                if (t >= 1) return true;
                return false;
            }
        });
    }, 1800);
    
    // PHASE 5: P4 -> P5 (500ms) - Final exit, then reset back to slot
    setTimeout(() => {
        addAnim({
            elapsed: 0, duration: 500,
            update(dt) {
                this.elapsed += dt;
                const t = Math.min(this.elapsed / this.duration, 1);
                square.position.lerpVectors(p4, p5, t);
                square.quaternion.copy(flatQuat);
                if (t >= 1) {
                    // Reset square back to original slot position
                    square.position.copy(square.userData.originalPos);
                    square.quaternion.copy(startQuat);
                    return true;
                }
                return false;
            }
        });
    }, 2600);
}

// NEW HIGH-QUALITY AMMO: White Glowing Sphere with a long Trail + Cube Pop Trigger
function createBullet(pig, targetCube, color) {
    const from = getMouthPosition(pig);
    const targetPos = targetCube.position.clone();
    
    // Core of the bullet (Glowing White Ball)
    const bulletGroup = new THREE.Group();
    
    // 1. The Head
    const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 10, toneMapped: false })
    );

        new THREE.CylinderGeometry(0.12, 0.02, 1.2, 12),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 })
    );
    tail.rotation.x = Math.PI / 2; // Lie flat
    tail.position.z = -0.5; // Place behind the head
    
    bulletGroup.add(head);
    bulletGroup.add(tail);
    bulletGroup.position.copy(from);

            this.elapsed += dt;
            const t = Math.min(this.elapsed / this.duration, 1);

            const easedT = 1 - Math.pow(1 - t, 3);
            bulletGroup.position.lerpVectors(from, targetPos, easedT);
            bulletGroup.lookAt(targetPos); // Points the trail exactly behind the head

            if (t >= 1) { 
                // --- TRIGGER THE CUBE POP AND BLAST UPON BULLET IMPACT ---
                playCubePopAnimation(targetCube, color);
                scene.remove(bulletGroup); 
                return true; 
            }
            return false;
        }
    });

// Integrated Combat Loop with Recoil & Beautiful Projectiles
async function shootAtCubes(pig) {
    const myColor = pig.userData.colorName;

    while (pig.userData.moving && pig.userData.value > 0) {
        let target = null;
        let minDist = 7;

        cubesToSmash.forEach((cube, index) => {
            if (cube.userData.colorName === myColor && !cube.userData.blocked) {
                const dist = pig.position.distanceTo(cube.position);
                if (dist < minDist) { minDist = dist; target = { cube, index }; }
            }
        });

        if (target) {
            // PRECISION TIMING: Mark cube as "gone" immediately for other pigs
            const targetRef = target.cube;
            cubesToSmash.splice(target.index, 1);
            
            // Trigger character effects
            applyRecoil(pig);                      // 1. Character Kickback
            createMuzzleFlash(getMouthPosition(pig)); // 2. Snout light pop
            
            // SEND CUBE REFERENCE: The bullet will trigger the pop animation on arrival
            createBullet(pig, targetRef, myColor); // 3. The Glow Bullet + Pop Animation
            
            // Recalculate inner/outer cube status (reveals previously blocked cubes)
            updateObstacleStatus();
            
            pig.userData.value--;
            updateCharLabel(pig);

            // Safety check for empty ammo
            if (pig.userData.value <= 0) {
                const idx = pig.userData.currentTileIndex;
                if (idx !== undefined && tileOccupancy[idx] === pig) {
                    tileOccupancy[idx] = null;
                    resetTileAppearance(idx); // Reset tile when character is removed
                }
                // Remove active square if character has one
                if (pig.userData.activeSquare) {
                    scene.remove(pig.userData.activeSquare);
                }
                scene.remove(pig);
                pig.userData.moving = false;
                return;
            }
        }
        await new Promise(r => setTimeout(r, 50)); 
    }
}

// Function for jumps (parabola)
function jumpToPoint(obj, target, duration) {
    return new Promise(resolve => {
        const start = obj.position.clone();
        const arcHeight = 2.0; // Higher arc for clearance
        addAnim({
            elapsed: 0, duration,
            update(dt) {
                this.elapsed += dt;
                const t = Math.min(this.elapsed / this.duration, 1);
                obj.position.lerpVectors(start, target, t);
                // Simple parabola
                obj.position.y = THREE.MathUtils.lerp(start.y, target.y, t) + Math.sin(t * Math.PI) * arcHeight;
                if (t >= 1) return true;
                return false;
            },
            finish: resolve
        });
    });
}

    // --- STEP B: TRANSPORT SQUARE ARRIVAL ---
    // Spawn the Square "elevator" just before character lands at Entry
    const activeCarrier = decorativeCubeModel.clone();
    activeCarrier.scale.set(0.12, 0.04, 0.12); // Flatter "Platform" scale
    activeCarrier.position.set(p1.x, -1, p1.z); // Start below floor
    scene.add(activeCarrier);

    // Animate Square popping up to meet the character
    await jumpToPoint(activeCarrier, new THREE.Vector3(p1.x, h - 0.1, p1.z), 400);

    // Sync point: Character lands on Square
    await deployment; 
    if(!pig.parent) { scene.remove(activeCarrier); return; }

    // Start Shooting
    shootAtCubes(pig);

    // --- STEP C: SHARED CARRIER JOURNEY ---
    // From this point on, the pig is on top of the carrier
    async function moveTogether(target, dur, rotY) {
        pig.rotation.y = rotY;
        const move1 = moveAlongPoint(pig, target, dur);
        const move2 = moveAlongPoint(activeCarrier, new THREE.Vector3(target.x, h - 0.1, target.z), dur);
        await Promise.all([move1, move2]);
    }

    await moveTogether(p2, 600, Math.PI / 2);
    if(!pig.parent) { scene.remove(activeCarrier); return; }

    await moveTogether(p3, 600, Math.PI);
    if(!pig.parent) { scene.remove(activeCarrier); return; }

    await moveTogether(p4, 800, -Math.PI / 2);
    if(!pig.parent) { scene.remove(activeCarrier); return; }

    await moveTogether(p5, 500, 0); // Down toward Blue Arrow End
    if(!pig.parent) { scene.remove(activeCarrier); return; }

    // --- STEP D: SQUARE DISAPPEARANCE ---
    // Before character takes final leap, Square "descends" and is deleted
    const disappear = jumpToPoint(activeCarrier, new THREE.Vector3(p5.x, -2, p5.z), 300);
    
    // --- STEP E: FINAL CHARACTER LANDING ---
    pig.rotation.y = Math.PI / 2;
    await jumpToPoint(pig, pFinal, 700);

    // Clean up
    await disappear;
    scene.remove(activeCarrier); 

    pig.userData.moving = false;
    pig.userData.onTile = true;
    updateTileAppearance(pig.userData.currentTileIndex, pig.userData.colorName);
}
   function onPointerDown(event) {
    const rect = renderer.domElement.getBoundingClientRect();
    pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);

    const intersects = raycaster.intersectObjects(scene.children, true);
    if (intersects.length === 0) return;

    let obj = intersects[0].object;
    let Char = null;
    while (obj) {
        if (obj.userData && obj.userData.parentChar) {
            Char = obj.userData.parentChar;
            break;
        }
        obj = obj.parent;
    }

    if (!Char || Char.userData.moving) return;

    // --- CHECK CURRENT CAPACITY ---
    const nextAvailableSlot = tileOccupancy.indexOf(null);

    // --- PATH A: CHARACTER IS ON A TILE ---
    if (Char.userData.onTile) {
        if (Char.userData.value > 0) {
            // Instant Undeployment: This character clears its seat immediately
            const currentSlot = Char.userData.currentTileIndex;
            if (currentSlot !== undefined) {
                tileOccupancy[currentSlot] = null; // SLOT IS NOW FREE
                resetTileAppearance(currentSlot); // Reset tile color
            }
            Char.userData.onTile = false; 
        } else {
            return; // Finished its job
        }
    } 
    // --- PATH B: CHARACTER IS IN THE GRID ---
    else {
        // ETHIC 1: THE CAPACITY CHECK
        // If there is no space (no 'null' in tileOccupancy), grid Chars are LOCKED
        if (nextAvailableSlot === -1) {
            console.log("WAIT: The tiles are at capacity!");
            shakeChar(Char); // Feedback wiggle
            return; 
        }

        // ETHIC 2: THE TRAFFIC CHECK
        const row = Char.userData.gridRow;
        const col = Char.userData.gridCol;
        for (let r = row - 1; r >= 0; r--) {
            if (occupancy[r][col] !== null) {
                shakeChar(Char); 
                return; // Blocked by character in front
            }
        }

        // Everything clear: Depart from grid
        occupancy[row][col] = null;
        shiftColumnForward(row, col); 
    }

    // --- SHARED LAUNCH PAD ---
    // Now we find the leftmost spot again (either a truly empty one or the one just vacated)
    const tIdx = tileOccupancy.indexOf(null);
    if (tIdx !== -1) {
        tileOccupancy[tIdx] = Char;
        Char.userData.currentTileIndex = tIdx;
        activateSquareAtEntry(Char); // Trigger square animation when character deploys
        performMillTravel(Char, tiles[tIdx]);
    }
}

// Spawn a finite starting character with calculated ammo
function createStartingCharacter(row, col, color, ammo) {
    if (!baseCharModel) return;
    const clone = baseCharModel.clone(true);
    clone.scale.setScalar(globalCharScale);

    clone.userData = {
        value: ammo, // <--- MATHEMATICAL AMMO
        colorName: color,
        gridRow: row,
        gridCol: col,
        moving: false,
        onTile: false,
        parentChar: clone
    };

    const label = createCharLabel(clone);
    label.position.set(0, 4, 0);
    label.renderOrder = 999;
    clone.add(label);

    clone.traverse((node) => {
        if (node.isMesh) {
            node.castShadow = true;
            node.receiveShadow = true;
            node.material = node.material.clone();
            if (node.material.color) node.material.color.set(color);
            node.userData.parentChar = clone;
        }
    });

    const x = (col - Math.floor(GRID/2)) * spacingGlobal;
    const z = (row - Math.floor(GRID/2)) * spacingGlobal + 7;
    clone.position.set(x, 0.5, z);
    clone.rotation.y = Math.PI / 2;

    scene.add(clone);
    occupancy[row][col] = clone;
    Chars.push(clone);
}

function spawnNewChar(row, col) {
    if (!baseCharModel || activeLevelColors.length === 0) return;

    const newChar = baseCharModel.clone(true);
    newChar.scale.setScalar(globalCharScale);

    // CRITICAL: Pull from MISSION COLORS only
    const missionColor = activeLevelColors[Math.floor(Math.random() * activeLevelColors.length)];
    const val = Math.random() > 0.5 ? 20 : 40;
    newChar.userData = {
        value: val,
        gridRow: row,
        gridCol: col,
        moving: false,
        onTile: false,
        parentChar: newChar,
        colorName: missionColor
    };

    const label = createCharLabel(newChar);
    label.position.set(0, 4, 0);
    label.renderOrder = 999;
    newChar.add(label);

    newChar.traverse((node) => {
        if (node.isMesh) {
            node.castShadow = true;
            node.receiveShadow = true;
            node.material = node.material.clone();
            if (node.material.color) node.material.color.set(missionColor);
            node.userData.parentChar = newChar;
        }
    });

    const x = (col - Math.floor(GRID/2)) * spacingGlobal;
    const z = (row - Math.floor(GRID/2)) * spacingGlobal + 7;
    newChar.position.set(x, 0.5, z + 2);
    newChar.rotation.y = Math.PI / 2;

    scene.add(newChar);
    occupancy[row][col] = newChar;

    const landingPos = new THREE.Vector3(x, 0.5, z);
    jumpToPoint(newChar, landingPos, 500);
}

function shiftColumnForward(vacatedRow, col) {
    // Move existing Chars up
    for (let r = vacatedRow + 1; r < GRID; r++) {
        const trailingChar = occupancy[r][col];
        if (trailingChar) {
            const targetRow = r - 1;
            occupancy[targetRow][col] = trailingChar;
            occupancy[r][col] = null;
            trailingChar.userData.gridRow = targetRow;

            const targetZ = (targetRow - Math.floor(GRID/2)) * spacingGlobal + 7;
            const targetX = (col - Math.floor(GRID/2)) * spacingGlobal;
            jumpToPoint(trailingChar, new THREE.Vector3(targetX, 0.5, targetZ), 400);
        }
    }

    // --- DISABLED: NO RESPAWNING ---
    // The game now has exactly 9 finite characters with calculated ammo.
    // No new characters will spawn. The column will show empty space once exhausted.
}



        renderer.domElement.addEventListener('pointerdown', onPointerDown);

        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        window.addEventListener('resize', onWindowResize);
        window.addEventListener('orientationchange', onWindowResize);

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta() * 1000, 40); // dt in ms, capped
            totalTime += dt * 0.0003; // Game time in seconds
            processAnims(dt);

            // --- CHARACTER EXCITEMENT LOGIC ---
            // Target characters in the 3x3 grid
            for (let r = 0; r < GRID; r++) {
                for (let c = 0; c < GRID; c++) {
                    const char = occupancy[r][c];
                    if (char && !char.userData.moving) {
                        // 1. Swing back and forth (X-rotation for sway)
                        // Offset by grid position so they don't move like robots
                        char.rotation.x = Math.sin(totalTime * 8 + r + c) * 0.15;

                        // 2. Small "nervous" breathing hop
                        char.position.y = 0.5 + Math.abs(Math.sin(totalTime * 4 + r + c)) * 0.05;
                    }
                }
            }

            // Target characters sitting on Tiles
            tileOccupancy.forEach((char, idx) => {
                if (char && !char.userData.moving) {
                    // Sway back and forth
                    char.rotation.x = Math.sin(totalTime * 8 + idx) * 0.15;
                    // Sitting breath hop
                    char.position.y = 0.3 + Math.abs(Math.sin(totalTime * 4 + idx)) * 0.05;
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }
        animate();
