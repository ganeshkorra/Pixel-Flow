        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            #hint { font-size: 11px; padding: 5px 8px; left: 8px; top: 8px; }
            .color-btn { width: 35px; height: 35px; }
            #controls { bottom: 15px; gap: 8px; }
        }
        
        @media (max-width: 480px) {
            #hint { font-size: 10px; padding: 4px 6px; left: 5px; top: 5px; }
            .color-btn { width: 30px; height: 30px; }
            #controls { bottom: 12px; gap: 6px; }
        }
        
        /* Landscape orientation adjustments */
        @media (max-height: 500px) and (orientation: landscape) {
            #hint { font-size: 10px; padding: 4px 6px; }
            .color-btn { width: 28px; height: 28px; }
            #controls { bottom: 10px; gap: 5px; }
        }
        
        /* Touch device optimizations */
        @media (hover: none) and (pointer: coarse) {
            .color-btn { width: 45px; height: 45px; }
            #hint { padding: 8px 12px; }
        }
        
        /* Prevent text selection on long touches */
        * { user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }

/* CTA Endscreen Styles */
#cta-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    display: none; /* Hidden until triggered */
    flex-direction: column;
    align-items: center;

#cta-text { width: 220px; margin-bottom: 30px; }
#cta-button { 
    width: 200px; 
    cursor: pointer; 
    transition: transform 0.2s;
    animation: pulse 1.5s infinite; 
}
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}


/* Tutorial hand Styles */

    0%, 100% { transform: scale(1) translateY(0); }

/* Pulsing Text Animation */

    0%, 100% { transform: scale(1); }

}

.pulsing-text {

}

// --- SMART HAND CALCULATOR ---
function positionHandOnSmartTarget() {
    if (gameEnded) return false;

    // 1. Check colors...
    const cubeColorPriority = {};
    cubesToSmash.forEach(cube => {
        if (!cube.userData.blocked) {
            const color = cube.userData.colorName;
            cubeColorPriority[color] = (cubeColorPriority[color] || 0) + 1;
        }
    });

    // 2. Search starting grid for available pigs
    let bestChar = null;
    let highestScore = -1;

    for (let c = 0; c < GRID; c++) {
        let topChar = null;
        for (let r = 0; r < GRID; r++) {
            if (occupancy[r][c]) {
                topChar = occupancy[r][c];
                break; 
            }
        }

        if (topChar) {
            const charColor = topChar.userData.colorName;
            const cubeCount = cubeColorPriority[charColor] || 0;
            if (cubeCount > highestScore) {
                highestScore = cubeCount;
                bestChar = topChar;
            }
        }
    }

    // --- LOGIC CHANGE HERE ---
    if (bestChar) {
        const vector = new THREE.Vector3();
        bestChar.updateMatrixWorld();
        vector.setFromMatrixPosition(bestChar.matrixWorld);
        vector.project(camera);

        const x = (vector.x * .5 + .5) * renderer.domElement.clientWidth;
        const y = (vector.y * -.5 + .5) * renderer.domElement.clientHeight;

        const handUI = document.getElementById('hand-guide-container');
        if (handUI) {
            handUI.style.left = (x + 30) + "px"; 
            handUI.style.top = (y - 10) + "px";   
            handUI.style.transform = 'translate(-50%, -50%)'; 
        }
        return true; // Successfully found a pig
    }

    return false; // No pigs left in starting grid!
}

        async function parseImageToLevel(imgUrl, width, height) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.src = imgUrl;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = width;
                    canvas.height = height;
                    
                    // Draw image scaled down to the machine size
                    ctx.drawImage(img, 0, 0, width, height);
                    const data = ctx.getImageData(0, 0, width, height).data;
                    const newPattern = [];

                    const palette = window.game_object.GameThemes.CubeColors.data;

                    for (let y = 0; y < height; y++) {
                        const row = [];
                        for (let x = 0; x < width; x++) {
                            const i = (y * width + x) * 4;
                            const r = data[i], g = data[i+1], b = data[i+2];
                            
                            // Logic: Find which of our 5 colors is closest to this pixel
                            let closestID = 0;
                            let minDist = Infinity;
                            
                            Object.keys(palette).forEach(id => {
                                const col = new THREE.Color(palette[id].code);
                                const dr = r - col.r * 255;
                                const dg = g - col.g * 255;
                                const db = b - col.b * 255;
                                const dist = dr*dr + dg*dg + db*db; // Math: distance check
                                if(dist < minDist) { minDist = dist; closestID = parseInt(id); }
                            });
                            row.push(closestID);
                        }
                        newPattern.push(row);
                    }
                    resolve(newPattern);
                };
            });

function createCharLabelTexture(text) {
    const canvas = document.createElement('canvas');
    canvas.width = 300;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');

    // Matching the game reference style: Bold white with thick black outline
    const fontSize = 150;
    ctx.font = `bold ${fontSize}px Arial Black, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // 1. Draw Thick Black Outline
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 28; 
    ctx.lineJoin = 'round';
    ctx.strokeText(text, 128, 128);

    // 2. Draw White Text Fill
    ctx.fillStyle = '#ffffff';
    ctx.fillText(text, 128, 128);

    return new THREE.CanvasTexture(canvas);
}

function createCharLabel(Char) {
    const text = Char.userData.value.toString();
    const texture = createCharLabelTexture(text);
    const spriteMaterial = new THREE.SpriteMaterial({ 
        map: texture, 
        transparent: true,
        depthTest: false
    });
    const sprite = new THREE.Sprite(spriteMaterial);
    sprite.scale.set(4, 4, 1);
    return sprite;
}

    const text = Char.userData.value.toString();
    const texture = createCharLabelTexture(text);

    if (label) {
        label.material.map.dispose();
        label.material.map = texture;
        label.material.needsUpdate = true;
    }

            return new Promise(resolve => {
                const anim = {
                    elapsed: 0,
                    duration,
                    update(dt) {
                        this.elapsed += dt;
                        const t = Math.min(this.elapsed / this.duration, 1);
                        obj.position.lerpVectors(from, to, t);
                        if (t >= 1) { return true; }
                        return false;
                    },
                    finish: resolve
                };
                addAnim(anim);   
            });
        }

        function runCircle(obj, center, duration, rotations = 2, radius = 0.25) {
            return new Promise(resolve => {
                const anim = {
                    elapsed: 0,
                    duration,
                    update(dt) {
                        this.elapsed += dt;
                        const t = Math.min(this.elapsed / this.duration, 1);
                        const angle = t * rotations * Math.PI * 2;
                        obj.position.x = center.x + Math.cos(angle) * radius;
                        obj.position.z = center.z + Math.sin(angle) * radius;
                        obj.rotation.y += dt * 6.0; // spin while running
                        if (t >= 1) { return true; }
                        return false;
                    },
                    finish: resolve
                };
                addAnim(anim);
            });

// CUBE POP AND BLAST ANIMATION: Squeeze -> Expansion -> Shatter
function playCubePopAnimation(cube, cubeColor) {
    const cubeSize = window.game_object.GameProperties.CubeSize;
    const originalScaleX = cubeSize.width;
    const originalScaleY = cubeSize.height;
    const originalScaleZ = cubeSize.depth;
    const popDuration = 500;

    addAnim({
        elapsed: 0, duration: popDuration,
        update(dt) {
            this.elapsed += dt;
            const t = this.elapsed / this.duration;

            if (t < 0.4) {
                // STAGE 1: THE SQUEEZE (Compressive reaction to bullet impact)
                // 0% -> 40% time: Cube gets thinner on X/Z, stretches tall on Y
                const squeeze = Math.sin((t / 0.4) * Math.PI);
                cube.scale.set(
                    originalScaleX * (2 - squeeze * 0.4), // Compress width
                    originalScaleY * (1 + squeeze * 0.2), // Stretch height (The Pop-up)
                    originalScaleZ * (2 - squeeze * 0.4)  // Compress depth
                );
                
            } else {
                // STAGE 2: THE BLAST (Rapid expansion before shatter)
                // 40% -> 100% time: Expands outward rapidly, fades to transparent
                const blast = (t - 0.4) / 0.6;
                const expand = 1 + Math.sin(blast * Math.PI) * 0.8; // Puffs out
                cube.scale.set(
                    originalScaleX * expand,
                    originalScaleY * expand,
                    originalScaleZ * expand
                );
                
                // Fade all materials to invisible
                cube.traverse(n => {
                    if (n.material) {
                        n.material.transparent = true;
                        n.material.opacity = 1 - blast;
                    }
                });
            }

            if (t >= 1) {
                createImpactEffect(cube.position.clone(), cubeColor); // Spawn final shards
                scene.remove(cube);
                return true;
            }
            return false;
        }
    });
}

    if (squareClones.length === 0 || !characterPathRail) return;

    const originalTraySquare = squareClones[nextSquareIndex % squareClones.length];
    nextSquareIndex++;

    const journeySquare = originalTraySquare.clone();

    journeySquare.scale.setScalar(0.2); // Journey scale

    // 3. THE TRAY RESPOND: "Power down" the slot in the tray
    originalTraySquare.visible = false; // Hide it immediately
    updateSlotCounterUI(); // <--- ADD THIS
    originalTraySquare.scale.setScalar(0); // Shrink it while invisible

    // 4. THE DELAY LOGIC (Reload Time)
    const reloadTime = 700; // Change this value to adjust the delay (700ms)
    
    setTimeout(() => {
        animateSquareRespawn(originalTraySquare); // Run respawn animation after delay
    }, reloadTime);

    // 5. Journey Animation (Starts fast)
    addAnim({
        elapsed: 0, duration: 190,
        update(dt) {
            this.elapsed += dt;
            const t = Math.min(this.elapsed / this.duration, 1);
            journeySquare.position.lerpVectors(startPos, railStart, t);
            const flip = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -t * Math.PI / 2);
            journeySquare.quaternion.copy(flip);
            return t >= 1;
        }
    });
}
function animateSquareRespawn(sq) {
    sq.visible = true; // Turn visibility back on
    updateSlotCounterUI(); 
    // Custom "Scale Bounce" Animation (0 -> 1.2 -> 1)
    addAnim({
        elapsed: 0, duration: 350,
        update(dt) {
            this.elapsed += dt;
            const t = this.elapsed / this.duration;
            
            // Industrial Bounce Formula
            let scaleEffect = 0;
            if (t < 0.7) {
                // Scaling up from 0 to 1.2
                scaleEffect = (t / 0.7) * 1.2;
            } else {
                // Settling down from 1.2 back to 1
                const settleT = (t - 0.7) / 0.3;
                scaleEffect = 1.2 - (settleT * 0.2);
            }
            
            sq.scale.setScalar(scaleEffect * sq.userData.originalScale);
            
            return t >= 1;
        }
    });
}

// Integrated Combat Loop with Recoil & Beautiful Projectiles
async function shootAtCubes(pig) {
    const myColor = pig.userData.colorName;

    while (pig.userData.moving && pig.userData.value > 0) {
        let target = null;
        let minDist = 5;

        cubesToSmash.forEach((cube, index) => {
            if (cube.userData.colorName === myColor && !cube.userData.blocked) {
                const dist = pig.position.distanceTo(cube.position);
                if (dist < minDist) { minDist = dist; target = { cube, index }; }
            }
        });

        if (target) {
           
            // PRECISION TIMING: Mark cube as "gone" immediately for other pigs
            const targetRef = target.cube;
            cubesToSmash.splice(target.index, 1);
             playSFX('ShotSound');
            
            // Trigger character effects
            applyRecoil(pig);                      // 1. Character Kickback
            createMuzzleFlash(getMouthPosition(pig)); // 2. Snout light pop
            
            // SEND CUBE REFERENCE: The bullet will trigger the pop animation on arrival
            createBullet(pig, targetRef, myColor); // 3. The Glow Bullet + Pop Animation
            
            // Recalculate inner/outer cube status (reveals previously blocked cubes)
            updateObstacleStatus();
            
            pig.userData.value--;
            updateCharLabel(pig);

            // Safety check for empty ammo
            if (pig.userData.value <= 0) {
                const idx = pig.userData.currentTileIndex;
                if (idx !== undefined && tileOccupancy[idx] === pig) {
                    tileOccupancy[idx] = null;
                    resetTileAppearance(idx); // Reset tile when character is removed
                }
                // Remove active square if character has one
                if (pig.userData.activeSquare) {
                    scene.remove(pig.userData.activeSquare);
                }
                scene.remove(pig);
                pig.userData.moving = false;
                return;
            }
        }
        await new Promise(r => setTimeout(r, 50)); 
    }
}

function moveAlongPoint(obj, target, duration) {

                this.elapsed += dt;
                const t = Math.min(this.elapsed / this.duration, 1);

            },

// Function for jumps (parabola)
function jumpToPoint(obj, target, duration) {
    return new Promise(resolve => {
        const start = obj.position.clone();
        const arcHeight = 2.0; // Higher arc for clearance
        addAnim({
            elapsed: 0, duration,
            update(dt) {
                this.elapsed += dt;
                const t = Math.min(this.elapsed / this.duration, 1);
                obj.position.lerpVectors(start, target, t);
                // Simple parabola
                obj.position.y = THREE.MathUtils.lerp(start.y, target.y, t) + Math.sin(t * Math.PI) * arcHeight;
                if (t >= 1) return true;
                return false;
            },
            finish: resolve
        });
    });
}

async function performMillTravel(pig, targetTile) {
    if (!characterPathRail) return;
    
    pig.userData.moving = true;
    const square = pig.userData.activeSquare;
    const h = 0.81;

    // STEP 1: PATH TRAVEL
    await new Promise(resolve => {
        let progress = 0;
        shootAtCubes(pig); 
        addAnim({
            duration: 3800, 
            update(dt) {
                progress += dt / this.duration;
                const t = Math.min(progress, 1);
                const railPos = characterPathRail.getPointAt(t);
                const aheadPos = characterPathRail.getPointAt(Math.min(t + 0.01, 1));
                const direction = new THREE.Vector3().subVectors(aheadPos, railPos).normalize();
                const sideVector = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), direction).normalize();
                if (square) {
                    square.position.copy(railPos).add(sideVector.multiplyScalar(-0.35));
                    square.position.y = h; 
                    square.lookAt(aheadPos.x, h, aheadPos.z);
                    square.quaternion.multiply(new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), -Math.PI/2)); 
                }
                pig.position.set(railPos.x, h + 0.35, railPos.z);
                pig.lookAt(aheadPos.x, h + 0.35, aheadPos.z);
                return t >= 1;
            },
            finish: resolve
        });
    });

    // STEP 2: REMOVE TRANSPORT SQUARE
    if (square) {
        tweenPosition(square, square.position.clone(), new THREE.Vector3(-4.5, h, 2.5), 300).then(() => {
            scene.remove(square);
            square.traverse(n => { if (n.geometry) n.geometry.dispose(); if (n.material) n.material.dispose(); });
        });
    }

    // STEP 3: THE SIT JUMP
    const pFinal = new THREE.Vector3(targetTile.position.x, 0.3, targetTile.position.z);
    pig.rotation.y = Math.PI / 2; 
    await jumpToPoint(pig, pFinal, 700);

    // LANDED STATUS
    pig.userData.onTile = true;
    pig.userData.moving = false;
    updateTileAppearance(pig.userData.currentTileIndex, pig.userData.colorName);

    // --- STEP 4: BOARD FULL (FAIL) DETECTION ---
    // Look at occupancy list
    if (tileOccupancy.indexOf(null) === -1) {
        // If board is logically full, wait until this final pig has finished landing
        const allSet = tileOccupancy.every(p => p && p.userData.onTile === true);
        if (allSet) {
            triggerFailSequence();
        }
    }
}

function shiftColumnForward(vacatedRow, col) {
    // Move existing Chars up
    for (let r = vacatedRow + 1; r < GRID; r++) {
        const trailingChar = occupancy[r][col];
        if (trailingChar) {
            const targetRow = r - 1;
            occupancy[targetRow][col] = trailingChar;
            occupancy[r][col] = null;
            trailingChar.userData.gridRow = targetRow;

            const targetZ = (targetRow - Math.floor(GRID/2)) * spacingGlobal + 7;
            const targetX = (col - Math.floor(GRID/2)) * spacingGlobal;
            jumpToPoint(trailingChar, new THREE.Vector3(targetX, 0.5, targetZ), 400);
        }
    }

    // --- DISABLED: NO RESPAWNING ---
    // The game now has exactly 9 finite characters with calculated ammo.
    // No new characters will spawn. The column will show empty space once exhausted.
}

        const currentTime = Date.now();
        const timeSinceLastTap = currentTime - lastInteractionTime;

        // If timer has started (after first click)
        if (isTimerActive) {
            timeLeft -= dt / 1000;

            // --- CHECK FOR END GAME CONDITIONS ---
            // 1. Time out OR 2. All cubes are destroyed (Victory)
            if (timeLeft <= 0 || cubesToSmash.length === 0) {
                triggerCTA();
            }
            
            // CHECK 2: Show Idle hint if player stops for 8s
            if (timeSinceLastTap > 8000) {
                showIdleHint();
            }
        }
    }

    totalTime += dt * 0.0003; 
    processAnims(dt);

    // --- CHARACTER EXCITEMENT LOGIC ---
    for (let r = 0; r < GRID; r++) {
        for (let c = 0; c < GRID; c++) {
            const char = occupancy[r][c];
            if (char && !char.userData.moving) {
                char.rotation.x = Math.sin(totalTime * 8 + r + c) * 0.15;
                char.position.y = 0.5 + Math.abs(Math.sin(totalTime * 4 + r + c)) * 0.05;
            }
        }
    }

    tileOccupancy.forEach((char, idx) => {
        if (char && !char.userData.moving) {
            char.rotation.x = Math.sin(totalTime * 8 + idx) * 0.15;
            char.position.y = 0.3 + Math.abs(Math.sin(totalTime * 4 + idx)) * 0.05;
        }
    });

    controls.update();
    renderer.render(scene, camera);
}
        animate();
    </script>
